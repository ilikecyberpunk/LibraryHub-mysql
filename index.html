<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>도서관리 시스템</title>
    <style>

        * { 
            margin: 0;
            padding: 0; 
            box-sizing: border-box; 
          }
        body { 
          font-family: 'Segoe UI', sans-serif; background: #f0f4f8; 
        }
  
        .navbar { background: #16213e; color: white; padding: 16px 30px; display: flex; gap: 20px; align-items: center; }
        .navbar h1 { font-size: 18px; margin-right: auto; }
        .navbar button { background: none; border: 1px solid rgba(255,255,255,0.3); color: white;
                         padding: 6px 16px; border-radius: 4px; cursor: pointer; }
        .navbar button:hover { background: rgba(255,255,255,0.1); }
        .navbar button.active { background: #0f3460; border-color: #0f3460; }

        .content { padding: 24px 30px; }
        .page { display: none; }
        .page.active { display: block; }

        .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
        .card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card .num { font-size: 32px; font-weight: bold; color: #16213e; }
        .card .label { color: #888; font-size: 13px; margin-top: 4px; }

        table { width: 100%; border-collapse: collapse; background: white;
                border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        th { background: #16213e; color: white; padding: 12px 16px; text-align: left; font-size: 13px; }
        td { padding: 11px 16px; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8f9ff; }

        .badge { padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge.y { background: #e8f5e9; color: #2e7d32; }
        .badge.n { background: #fce4ec; color: #c62828; }

        .section-title { font-size: 16px; font-weight: bold; color: #16213e; margin-bottom: 12px; }

        .form-box { background: white; border-radius: 10px; padding: 20px;
                    box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; max-width: 500px; }
        .form-box input { width: 100%; padding: 8px 12px; border: 1px solid #ddd;
                          border-radius: 6px; margin-bottom: 10px; font-size: 13px; }
        .form-box button { background: #16213e; color: white; border: none;
                           padding: 9px 20px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .form-box button:hover { background: #0f3460; }
        .msg { font-size: 13px; color: #2e7d32; margin-top: 8px; }
    </style>
</head>
<body>

    <div class="navbar">
        <h1>📚 도서관리 시스템</h1>
        <button class="active" onclick="showPage('dashboard')">대시보드</button>
        <button onclick="showPage('books')">도서 목록</button>
        <button onclick="showPage('members')">회원 목록</button>
        <button onclick="showPage('loan')">대출 / 반납</button>
    </div>

    <div class="content">

        <div id="dashboard" class="page active">
            <div class="cards">
                <div class="card"><div class="num" id="totalBooks">-</div><div class="label">전체 도서</div></div>
                <div class="card"><div class="num" id="availableBooks">-</div><div class="label">대출 가능</div></div>
                <div class="card"><div class="num" id="totalMembers">-</div><div class="label">전체 회원</div></div>
            </div>
            <div class="section-title">최근 도서 목록</div>
            <table id="dashTable">
                <thead>
                    <tr><th>ID</th><th>제목</th><th>저자</th><th>상태</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div id="books" class="page">
            <div class="section-title">도서 목록</div>
            <table id="bookTable">
                <thead>
                    <tr><th>ID</th><th>제목</th><th>저자</th><th>대출 가능</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div id="members" class="page">
            <div class="section-title">회원 목록</div>
            <table id="memberTable">
                <thead>
                    <tr><th>ID</th><th>이름</th><th>전화번호</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div id="loan" class="page">
            <div class="section-title">현재 대출 목록</div>
        <table id="loanTable" style="margin-bottom:24px;">
            <thead>
                <tr><th>대출 ID</th><th>도서 제목</th><th>회원 이름</th><th>대출일</th></tr>
            </thead>
            <tbody></tbody>
        </table>
            <div class="section-title">대출 등록</div>
            <div class="form-box">
                <input type="number" id="loanBookId" placeholder="도서 ID">
                <input type="number" id="loanMemberId" placeholder="회원 ID">
                <button onclick="registerLoan()">대출 등록</button>
                <div class="msg" id="loanMsg"></div>
            </div>
            <div class="section-title">반납 처리</div>
            <div class="form-box">
                <input type="number" id="returnLoanId" placeholder="대출 ID">
                <input type="number" id="returnBookId" placeholder="도서 ID">
                <button onclick="returnBook()">반납 처리</button>
                <div class="msg" id="returnMsg"></div>
            </div>
        </div>

    </div>

    <script>
        const API = 'http://localhost:8080';

        function showPage(name) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.navbar button').forEach(b => b.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            event.target.classList.add('active');
            if (name === 'dashboard') loadDashboard();
            if (name === 'books') loadBooks();
            if (name === 'members') loadMembers();
            if (name === 'loan') loadLoans();
        }

        async function loadBooks() {
            const res = await fetch(API + '/books');
            const books = await res.json();
            const tbody = document.querySelector('#bookTable tbody');
            tbody.innerHTML = books.map(b => `
                <tr>
                    <td>${b.bookId}</td>
                    <td>${b.title}</td>
                    <td>${b.author}</td>
                    <td><span class="badge ${b.isAvailable ? 'y' : 'n'}">${b.isAvailable ? '가능' : '대출중'}</span></td>
                </tr>`).join('');
            return books;
        }

        async function loadMembers() {
            const res = await fetch(API + '/members');
            const members = await res.json();
            document.querySelector('#memberTable tbody').innerHTML = members.map(m => `
                <tr>
                    <td>${m.memberId}</td>
                    <td>${m.name}</td>
                    <td>${m.phone}</td>
                </tr>`).join('');
            return members;
        }

        async function loadDashboard() {
            const [books, members] = await Promise.all([
                fetch(API + '/books').then(r => r.json()),
                fetch(API + '/members').then(r => r.json())
            ]);
            document.getElementById('totalBooks').textContent = books.length;
            document.getElementById('availableBooks').textContent = books.filter(b => b.isAvailable).length;
            document.getElementById('totalMembers').textContent = members.length;
            document.querySelector('#dashTable tbody').innerHTML = books.slice(0, 8).map(b => `
                <tr>
                    <td>${b.bookId}</td>
                    <td>${b.title}</td>
                    <td>${b.author}</td>
                    <td><span class="badge ${b.isAvailable ? 'y' : 'n'}">${b.isAvailable ? '가능' : '대출중'}</span></td>
                </tr>`).join('');
        }

        async function registerLoan() {
            const bookId = document.getElementById('loanBookId').value;
            const memberId = document.getElementById('loanMemberId').value;
            const res = await fetch(API + '/loan', {
                method: 'POST',
                body: `bookId=${bookId}&memberId=${memberId}`
            });
            const data = await res.json();
            document.getElementById('loanMsg').textContent = data.result;
        }

        async function returnBook() {
            const loanId = document.getElementById('returnLoanId').value;
            const bookId = document.getElementById('returnBookId').value;
            const res = await fetch(API + '/return', {
                method: 'POST',
                body: `loanId=${loanId}&bookId=${bookId}`
            });
            const data = await res.json();
            document.getElementById('returnMsg').textContent = data.result;
        }

            async function loadLoans() {
            const res = await fetch(API + '/loans');
            const loans = await res.json();
            document.querySelector('#loanTable tbody').innerHTML = loans.map(l => `
            <tr>
                    <td><strong style="color:#2563eb">${l.loanId}</strong></td>
                    <td>${l.title}</td>
                    <td>${l.name}</td>
                    <td>${l.loanDate}</td>
            </tr>`).join('');
        }

        loadDashboard();
    </script>
</body>
</html>
